# APISIX configuration for BoundedAuthT (BAT)
# This file defines upstream routes and plugin configurations

# Upstream for BAT API Gateway
upstreams:
  - id: bat-api-upstream
    type: roundrobin
    nodes:
      - host: bat-api
        port: 8080
        weight: 1
    timeout:
      connect: 6s
      send: 6s
      read: 6s
    keepalive_pool:
      size: 320
      timeout: 60s
      idle_timeout: 10s

  - id: mock-tenant-upstream
    type: roundrobin
    nodes:
      - host: mock-tenant
        port: 8081
        weight: 1
    timeout:
      connect: 6s
      send: 6s
      read: 6s

# Routes for tenant subdomains
routes:
  # Route for tenant subdomains (e.g., company-a.localhost:9080)
  - id: tenant-auth-route
    uri: "/api/auth/*"
    hosts:
      - "*.localhost"
    upstream_id: bat-api-upstream
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID"
        expose_headers: "Content-Length,Content-Range"
      opentelemetry:
        sampler:
          name: always_on
      request-id:
        include_in_response: true
        generator: "uuid#counter"
      proxy-rewrite:
        headers:
          X-Forwarded-For: "$remote_addr"
          X-Real-IP: "$remote_addr"

  # Route for direct API access
  - id: bat-api-direct-route
    uri: "/api/*"
    upstream_id: bat-api-upstream
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID"
      opentelemetry:
        sampler:
          name: always_on

  # Route for internal OTP exchange
  - id: internal-exchange-route
    uri: "/internal/exchange"
    upstream_id: bat-api-upstream
    plugins:
      ip-restriction:
        whitelist:
          - "172.20.0.0/16"  # Allow only internal network
      opentelemetry:
        sampler:
          name: always_on

  # Route for mock tenant service (for testing)
  - id: mock-tenant-route
    uri: "/internal/*"
    upstream_id: mock-tenant-upstream
    plugins:
      cors:
        allow_origins: "*"
        allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
        allow_headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization"
      opentelemetry:
        sampler:
          name: always_on

  # Route for mock tenant dashboard
  - id: mock-tenant-dashboard-route
    uri: "/dashboard"
    upstream_id: mock-tenant-upstream
    plugins:
      cors:
        allow_origins: "*"
      opentelemetry:
        sampler:
          name: always_on

  # Health check routes
  - id: bat-api-health-route
    uri: "/health"
    upstream_id: bat-api-upstream
    plugins:
      cors:
        allow_origins: "*"

  - id: mock-tenant-health-route
    uri: "/health"
    upstream_id: mock-tenant-upstream
    plugins:
      cors:
        allow_origins: "*"

# Global plugin configuration
plugins:
  cors:
    allow_origins: "*"
    allow_methods: "GET,POST,PUT,DELETE,OPTIONS"
    allow_headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-Tenant-ID"
    expose_headers: "Content-Length,Content-Range"
  opentelemetry:
    sampler:
      name: always_on
    set:
      resource:
        - "service.name=apisix"
        - "service.version=3.11.0"
  prometheus:
    enable_exporter: true
    export_addr:
      ip: "0.0.0.0"
      port: 9091
    export_uri: "/apisix/prometheus/metrics"
    metric_prefix: "apisix_"
  request-id:
    include_in_response: true
    generator: "uuid#counter"
