apisix:
  node_listen: 9080
  enable_ipv6: false
  enable_control: true
  enable_admin: true
  admin_key:
    - edd1c9f034335f136f87ad84b625c8f1
  admin_listen:
    ip: 0.0.0.0
    port: 9091
  etcd:
    host:
      - "http://etcd:2379"
    prefix: "/apisix"
    timeout: 30
  plugins:
    - real-ip
    - ai-proxy
    - client-control
    - proxy-cache
    - request-id
    - zipkin
    - ext-plugin-pre-req
    - fault-injection
    - mocking
    - serverless-pre-function
    - cors
    - ip-restriction
    - referer-restriction
    - ua-restriction
    - uri-blocker
    - request-validation
    - openid-connect
    - authz-keycloak
    - wolf-rbac
    - ldap-auth
    - hmac-auth
    - basic-auth
    - jwt-auth
    - key-auth
    - consumer
    - authz-casbin
    - opa
    - authz-casbin
    - forward-auth
    - multi-auth
    - opentelemetry
    - prometheus
    - node-status
    - logging
    - grpc-transcode
    - grpc-web
    - proxy-mirror
    - proxy-rewrite
    - response-rewrite
    - degraphql
    - body-transformer
    - kafka-proxy
    - dubbo-proxy
    - public-api
    - workflow
    - serverless-post-function
    - ext-plugin-post-req
    - ext-plugin-post-resp
  stream_plugins:
    - mqtt-proxy
    - ip-restriction
    - limit-conn
    - limit-req
    - prometheus
    - node-status
  proxy_protocol:
    listen_http_port: 9180
    listen_https_port: 9143
  port_admin: 9091
nginx_config:
  error_log: "/dev/stderr"
  error_log_level: "warn"
  worker_processes: "auto"
  worker_rlimit_nofile: 20480
  event:
    worker_connections: 10620
  http:
    access_log: "/dev/stdout"
    keepalive_timeout: 60s
    keepalive_requests: 1000
    client_header_timeout: 60s
    client_body_timeout: 60s
    send_timeout: 60s
    proxy_read_timeout: 60s
    proxy_buffer_size: 64k
    proxy_buffers: "4 32k"
    proxy_busy_buffers_size: 64k
    proxy_temp_file_write_size: 64k
  upstream:
    keepalive: 320
